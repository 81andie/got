
<!-- drawer init and toggle -->
<div class="text-center absolute top-30 left-2">
   <button
(click)="toggle()"

   class="inline-flex items-center justify-center text-white bg-mauve-950 box-border border border-transparent hover:bg-amber-300 focus:ring-4 focus:ring-amber-200 shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none" type="button" data-drawer-target="drawer-right-example" data-drawer-show="drawer-right-example" data-drawer-placement="right" aria-controls="drawer-right-example">
   Open
   </button>
</div>


<!-- drawer component -->

  <div id="drawer-right-example"
  class="text-white sm:w-full md:w-96 fixed top-0 right-0 z-50 h-screen p-5 overflow-y-auto transition-transform  bg-no-repeat bg-cover  bg-mauve-900 bg-blend-overlay  " tabindex="-1" aria-labelledby="drawer-right-label"
 [ngClass]="{

    'translate-x-0': opened,
    'translate-x-full': !opened
  }"

  >
   <div class="border-b border-default pb-4 mb-5 flex justify-items-center">
      <h5 id="drawer-right-example" class="CinzelFont inline-flex items-center text-2xl font-bold text-fg-brand-strong-strong">
         <svg class="w-5 h-5 me-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        Localizaciones
      </h5>
      <button
(click)="clear()"

      type="button" data-drawer-hide="drawer-right-example" aria-controls="drawer-right-example" class="text-white bg-danger-strong hover:text-heading hover:bg-neutral-tertiary rounded-base w-9 h-9 absolute top-2.5 end-2.5 flex items-center justify-center">
         <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
         <span class="sr-only">Close menu</span>
      </button>
   </div>
   <p class="mb-3 text-sm text-stone-200 font-bold">Estás muy cerca<a href="#" class="font-medium  underline hover:no-underline"></a> de estos escenarios</p>

   <p class="mb-5 text-2xl text-stone-400 font-bold">{{ localization()?.real_place }}</p>

   <ul>


    <li class="p-1 mb-1 font-bold">
    <div class="flex gap-0.5">
    <svg class="w-6 h-6 text-stone-600 dark:text-black" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
    <path d="M7.833 2c-.507 0-.98.216-1.318.576A1.92 1.92 0 0 0 6 3.89V21a1 1 0 0 0 1.625.78L12 18.28l4.375 3.5A1 1 0 0 0 18 21V3.889c0-.481-.178-.954-.515-1.313A1.808 1.808 0 0 0 16.167 2H7.833Z"/>
     </svg>

     </div>
    <img [src]="localization()?.place_image">

    </li>
   </ul>

   <div class="flex flex-wrap mt-5 justify-center-safe ">
<p class="mb-5 mt-5 text-md text-stone-400 font-bold">Escene: {{localization()?.scene}}</p>
    <img [src]="localization()?.place_logo" class=" h-20  ">
</div>

 <p class="mt-5 mb-5 text-xl text-stone-400 font-bold ">Personajes</p>

   @for( item of localization()?.actors; track item;){
<div class="flex justify-center place-content-center-safe">
  <div class="flex flex-col ">
     <p class="text-xs mt-2">{{item.name}}</p>
  <p class="text-md mt-2">{{item.nameActor}}</p>
  </div>

    <img class="w-18 h-18 mb-2 border-2 object-cover ml-2 border-buffer rounded-full" [src]="item.image" alt="">
</div>
   }


</div>
